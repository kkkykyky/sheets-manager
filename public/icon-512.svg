  <rect x="118" y="166" width="62" height="8" rx="4" fill="#1a73e8" opacity="0.7"/>
  <rect x="222" y="166" width="48" height="8" rx="4" fill="#5f6368" opacity="0.4"/>
  <rect x="326" y="166" width="54" height="8" rx="4" fill="#34a853" opacity="0.6"/>
  <rect x="118" y="218" width="50" height="8" rx="4" fill="#5f6368" opacity="0.4"/>
