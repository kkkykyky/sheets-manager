  <rect x="222" y="270" width="44" height="8" rx="4" fill="#5f6368" opacity="0.4"/>
  <rect x="326" y="270" width="60" height="8" rx="4" fill="#1a73e8" opacity="0.5"/>
  <rect x="118" y="322" width="44" height="8" rx="4" fill="#5f6368" opacity="0.4"/>
  <rect x="222" y="322" width="56" height="8" rx="4" fill="#ea4335" opacity="0.4"/>
  <rect x="326" y="322" width="48" height="8" rx="4" fill="#34a853" opacity="0.5"/>
