<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="sheet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8f0fe;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- シートカード -->
  <rect x="100" y="96" width="312" height="320" rx="18" fill="url(#sheet)"/>
  <!-- ヘッダー行（緑） -->
  <rect x="100" y="96" width="312" height="56" rx="18" fill="#34a853"/>
  <rect x="100" y="130" width="312" height="22" fill="#34a853"/>
  <!-- グリッド横線 -->
  <line x1="100" y1="208" x2="412" y2="208" stroke="#c5cae9" stroke-width="2"/>
  <line x1="100" y1="260" x2="412" y2="260" stroke="#c5cae9" stroke-width="2"/>
